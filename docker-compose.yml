services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: turf_booking
    ports:
      - "5432:5432"
    volumes:
      - turf_booking_pg:/var/lib/postgresql/data

volumes:
  turf_booking_pg:

